<!DOCTYPE html>
<html lang="en">

    <title>{{ page.title }}</title>

    <style>
        body {
            font-family: Inter, system-ui, sans-serif;
            background: #0a0f1c;
            color: #e7edf7;
            line-height: 1.7;
            padding: 32px 20px;
            max-width: 800px;
            margin: auto;
        }

        a {
            color: #7aa2ff;
        }

        h1 {
            font-size: 2.5rem;
